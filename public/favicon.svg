<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <!-- Rounded elegant deep stone-slate background -->
  <rect width="128" height="128" rx="28" fill="#1c1917"/>
  <!-- Classic gold warm accent border -->
  <rect x="14" y="14" width="100" height="100" rx="16" fill="none" stroke="#d4af37" stroke-width="4" opacity="0.9"/>
  <!-- Elegant minimalist wooden door silhouette in gold -->
  <g transform="translate(42, 28)">
    <rect x="0" y="0" width="44" height="72" rx="4" fill="none" stroke="#d4af37" stroke-width="4"/>
    <!-- Door panels -->
    <rect x="5" y="6" width="14" height="26" rx="2" fill="none" stroke="#d4af37" stroke-width="2" opacity="0.8"/>
    <rect x="25" y="6" width="14" height="26" rx="2" fill="none" stroke="#d4af37" stroke-width="2" opacity="0.8"/>
    <rect x="5" y="38" width="14" height="28" rx="2" fill="none" stroke="#d4af37" stroke-width="2" opacity="0.8"/>
    <rect x="25" y="38" width="14" height="28" rx="2" fill="none" stroke="#d4af37" stroke-width="2" opacity="0.8"/>
    <!-- Metallic door handle knocker -->
    <circle cx="39" cy="36" r="2.5" fill="#ffffff" stroke="#d4af37" stroke-width="1"/>
  </g>
</svg>
